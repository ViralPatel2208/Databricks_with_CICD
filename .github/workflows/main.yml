#This workflow validates, deploys, and runs the specified bundle
#within a production target named "prod".

name: 'Production deployment

#Ensure that only a single job or workflow using the same concurrency group
#runs at a time.

concurrency: 1
#Trigger this workflow whenever a pull request is pushed to the repo's
#main branch.
on:
    push:
        branches:
            - main
        paths:
            - 'bakehosue_analytics/**'

jobs:
    deploy:
        name: 'Deploy bundle
        runs-on: ubuntu-latest

        steps:
          #check out this repo, so that this worklow can access it.
          - uses: actions/checkout@v3

          #download the databricks CLI.
          #see https://github.com/databricks/steup-cli
          - uses: databricks/setup-cli@main

          #deploy to bunble to prod  target as defined
          #in the bundle setting file 
          - run: databricks bundle deploy
            working-directory: backhouse_analytics
            env: 
                DATABRICKS_TOKEN: ${{SECRET.DB_TOKEN}}
                DATABRICKS_BUNDLE_ENV: ${{env}}