# This workflow validates and deploys the specified bundle
# to either the "dev" or "prod" target, depending on which
# branch was pushed to.
name: 'Production deployment'

# Ensure that only one run of this workflow executes at a time
# (per branch), so deployments don't race each other.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Trigger this workflow whenever a commit is pushed to main or dev,
# but only if files under bakehouse_analytics/ changed.
on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'bakehouse_analytics/**'

jobs:
  deploy:
    name: 'Deploy bundle'
    runs-on: ubuntu-latest
    steps:
      # Check out this repo, so that this workflow can access it.
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2  # Fetch last 2 commits to detect changes

      # Download the Databricks CLI.
      # See https://github.com/databricks/setup-cli
      - uses: databricks/setup-cli@main

      # Set target environment based on branch
      - name: Set environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

      # Deploy the bundle to the target determined above,
      # as defined in the bundle settings file (databricks.yml).
      - name: Deploy bundle
        run: databricks bundle deploy --target ${{ steps.set-env.outputs.env }}
        working-directory: bakehouse_analytics
        env:
          DATABRICKS_TOKEN: ${{ secrets.DB_TOKEN }}
          DATABRICKS_BUNDLE_ENV: ${{ steps.set-env.outputs.env }}

  # Run the job only if src folder changed - Depends on deploy job
  run_job:
    name: 'Run bakehouse_data_refresh job'
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      # Check out this repo, so that this workflow can access it.
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2  # Fetch last 2 commits to detect changes

      # Download the Databricks CLI.
      # See https://github.com/databricks/setup-cli
      - uses: databricks/setup-cli@main

      # Set target environment based on branch
      - name: Set environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

      # Check if src folder has changes
      - name: Check for src changes
        id: check-src
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          
          if echo "$CHANGED_FILES" | grep -q "bakehouse_analytics/src/"; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Changes detected in bakehouse_analytics/src folder"
            echo "Changed files: $CHANGED_FILES"
          else
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No changes in bakehouse_analytics/src folder"
            echo "Changed files: $CHANGED_FILES"
          fi

      # Run the job ONLY if src folder changed
      - name: Run bakehouse_data_refresh job
        if: steps.check-src.outputs.src_changed == 'true'
        run: databricks bundle run Bakehouse_data_refresh --target ${{ steps.set-env.outputs.env }}
        working-directory: bakehouse_analytics
        env:
          DATABRICKS_TOKEN: ${{ secrets.DB_TOKEN }}
          DATABRICKS_BUNDLE_ENV: ${{ steps.set-env.outputs.env }}
